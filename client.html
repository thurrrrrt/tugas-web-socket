<!DOCTYPE html>
<html>
<head>
    <title>Scraping Wartabromo</title>
</head>
<body>
    <h1>Data Berita Wartabromo (Realtime)</h1>
    <ul id="list"></ul>

    <script>
        const ws = new WebSocket("ws://localhost:8765");

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const list = document.getElementById("list");
            list.innerHTML = "";

            data.forEach(item => {
                const li = document.createElement("li");
                li.innerHTML = `<b>${item.judul}</b><br>
                                ${item.tanggal}<br>
                                <a href="${item.link}" target="_blank">Baca</a>`;
                list.appendChild(li);
            });
        };
    </script>
</body>
</html>
